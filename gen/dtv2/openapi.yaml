          format: uuid
        name:
          type: string
        description:
          type: string
        author:
          type: string
        priority:
          type: integer
          format: int32
        operation_mode:
          $ref: "#/components/schemas/vuln-policy-operation-mode"
        source:
          $ref: "#/components/schemas/vuln-policy-source"
    vuln-policy-analysis:
      required:
      - state
      type: object
      properties:
        state:
          type: string
          enum:
          - EXPLOITABLE
          - IN_TRIAGE
          - FALSE_POSITIVE
          - NOT_AFFECTED
          - RESOLVED
        justification:
          type: string
          enum:
          - CODE_NOT_PRESENT
          - CODE_NOT_REACHABLE
          - REQUIRES_CONFIGURATION
          - REQUIRES_DEPENDENCY
          - REQUIRES_ENVIRONMENT
          - PROTECTED_BY_COMPILER
          - PROTECTED_AT_RUNTIME
          - PROTECTED_AT_PERIMETER
          - PROTECTED_BY_MITIGATING_CONTROL
        vendor_response:
          type: string
          enum:
          - CAN_NOT_FIX
          - WILL_NOT_FIX
          - UPDATE
          - ROLLBACK
          - WORKAROUND_AVAILABLE
        details:
          type: string
        suppress:
          type: boolean
          default: false
    vuln-policy-rating:
      required:
      - method
      - severity
      type: object
      properties:
        method:
          type: string
          enum:
          - CVSSV2
          - CVSSV3
          - CVSSV4
          - OWASP
        severity:
          type: string
          enum:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
          - INFO
        vector:
          type: string
        score:
          type: number
          format: double
    vuln-policy-operation-mode:
      type: string
      enum:
      - DISABLED
      - APPLY
      - LOG
    vuln-policy-condition-error:
      required:
      - column
      - line
      - message
      type: object
      properties:
        line:
          type: integer
          description: Line number where the error occurred
          format: int32
        column:
          type: integer
          description: Column number where the error occurred
          format: int32
        message:
          type: string
          description: Description of the error
    vuln-policy-source:
      type: string
      enum:
      - USER
      - BUNDLE
    list-vuln-policy-bundles-response-item:
      required:
      - url
      - uuid
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        url:
          type: string
        hash:
          type: string
        last_successful_sync:
          $ref: "#/components/schemas/timestamp"
        created:
          $ref: "#/components/schemas/timestamp"
        updated:
          $ref: "#/components/schemas/timestamp"
    task-queue:
      required:
      - capacity
      - created_at
      - depth
      - name
      - status
      type: object
      properties:
        name:
          type: string
        status:
          $ref: "#/components/schemas/task-queue-status"
        capacity:
          minimum: 1
          type: integer
          format: int32
        depth:
          minimum: 0
          type: integer
          format: int32
        created_at:
          $ref: "#/components/schemas/timestamp"
        updated_at:
          $ref: "#/components/schemas/timestamp"
    task-queue-status:
      type: string
      enum:
      - ACTIVE
      - PAUSED
    list-workflow-run-events-response-item:
      required:
      - event
      - sequence_number
      type: object
      properties:
        sequence_number:
          type: integer
          format: int32
        event:
          type: object
          additionalProperties: true
    total-count:
      required:
      - count
      - type
      type: object
      properties:
        count:
          minimum: 0
          type: integer
          description: "The total number of records across all pages. Might be an\
            \ exact count, or a lower bound. Refer to the `type` field for the applicable\
            \ semantics."
          format: int64
        type:
          $ref: "#/components/schemas/total-count-type"
    scope:
      type: string
      enum:
      - REQUIRED
      - OPTIONAL
      - EXCLUDED
    license:
      type: object
      properties:
        name:
          maxLength: 255
          type: string
        license_id:
          maxLength: 255
          type: string
        uuid:
          type: string
          format: uuid
        osi_approved:
          type: boolean
        fsf_libre:
          type: boolean
        custom_license:
          type: boolean
    component-project:
      type: object
      properties:
        name:
          maxLength: 255
          type: string
        version:
          maxLength: 255
          type: string
        uuid:
          type: string
          format: uuid
    dependency-metrics:
      type: object
      properties:
        critical:
          type: integer
          format: int32
        high:
          type: integer
          format: int32
        medium:
          type: integer
          format: int32
        low:
          type: integer
          format: int32
        unassigned:
          type: integer
          format: int32
        vulnerabilities:
          type: integer
          format: int32
        suppressed:
          type: integer
          format: int32
        inherited_risk_score:
          type: number
          format: double
        findings_total:
          type: integer
          format: int32
        findings_audited:
          type: integer
          format: int32
        findings_unaudited:
          type: integer
          format: int32
        policy_violations_fail:
          type: integer
          format: int32
        policy_violations_warn:
          type: integer
          format: int32
        policy_violations_info:
          type: integer
          format: int32
        policy_violations_total:
          type: integer
          format: int32
        policy_violations_audited:
          type: integer
          format: int32
        policy_violations_unaudited:
          type: integer
          format: int32
        policy_violations_security_total:
          type: integer
          format: int32
        policy_violations_security_audited:
          type: integer
          format: int32
        policy_violations_security_unaudited:
          type: integer
          format: int32
        policy_violations_license_total:
          type: integer
          format: int32
        policy_violations_license_audited:
          type: integer
          format: int32
        policy_violations_license_unaudited:
          type: integer
          format: int32
        policy_violations_operational_total:
          type: integer
          format: int32
        policy_violations_operational_audited:
          type: integer
          format: int32
        policy_violations_operational_unaudited:
          type: integer
          format: int32
    package-metadata:
      required:
      - resolved_at
      type: object
      properties:
        latest_version:
          type: string
          description: |
            Latest known version in the configured registries. Null when the resolver ran but returned no version.
          nullable: true
        latest_version_published_at:
          description: |
            When the latest version was published. May be null even when latest_version is non-null, as some registries do not report publication dates.
          nullable: true
          allOf:
          - $ref: "#/components/schemas/timestamp"
        resolved_at:
          description: When package metadata was last resolved from the upstream repository.
          allOf:
          - $ref: "#/components/schemas/timestamp"
      description: |
        Latest version information from configured package registries. Only present when the component has a PURL with a type supported by at least one configured repository, and metadata has been successfully resolved from an upstream repository. Metadata resolution is asynchronous and runs in the background after a component is created or updated. This field may be absent for recently created components until resolution completes.
    package-artifact-metadata:
      type: object
      properties:
        hashes:
          $ref: "#/components/schemas/hashes"
        published_at:
          description: When this artifact was published to the repository.
          nullable: true
          allOf:
          - $ref: "#/components/schemas/timestamp"
        resolved_from:
          type: string
          description: Identifier of the repository from which artifact metadata was
            fetched.
          nullable: true
        resolved_at:
          description: When artifact metadata was last resolved from the upstream
            repository.
          nullable: true
          allOf:
          - $ref: "#/components/schemas/timestamp"
      description: |
        Artifact-level metadata for the component's exact version from configured package repositories. Only present when the component has a PURL with a version, the PURL type is supported by at least one configured repository, and artifact metadata has been successfully resolved from an upstream repository. Metadata resolution is asynchronous and runs in the background after a component is created or updated. This field may be absent for recently created components until resolution completes.
    extension-test-check-status:
      type: string
      enum:
      - PASSED
      - FAILED
      - SKIPPED
    total-count-type:
      type: string
      enum:
      - AT_LEAST
      - EXACT
  responses:
    generic-unauthorized-error:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/problem-details"
          example:
            type: about:blank
            status: 401
            title: Unauthorized
            detail: Not authorized to access the requested resource.
    generic-forbidden-error:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/problem-details"
          example:
            type: about:blank
            status: 403
            title: Forbidden
            detail: Not permitted to access the requested resource.
    generic-error:
      description: Unexpected error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/problem-details"
    generic-conflict-error:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/problem-details"
          example:
            type: about:blank
            status: 409
            title: Conflict
            detail: The resource already exists.
    generic-not-found-error:
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/problem-details"
          example:
            type: about:blank
            status: 404
            title: Not Found
            detail: The requested resource could not be found.
    invalid-request-error:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/invalid-request-problem-details"
          example:
            type: about:blank
            status: 400
            title: Bad Request
            detail: The request could not be processed because it failed validation.
            errors:
            - path: foo.bar
              value: baz
              message: Must be a number
  parameters:
    pagination-limit:
      name: limit
      in: query
      description: Maximum number of items to retrieve from the collection
      schema:
        maximum: 1000
        minimum: 1
        type: integer
        format: int32
        default: 100
    page-token:
      name: page_token
      in: query
      description: Opaque token pointing to a specific position in a collection
      schema:
        type: string
    sort-direction:
      name: sort_direction
      in: query
      schema:
        $ref: "#/components/schemas/sort-direction"
    sort-by:
      name: sort_by
      in: query
      description: Field to sort by. Refer to the operation description for information
        about which fields are sortable.
      schema:
        maxLength: 255
        minLength: 1
        type: string
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      description: Authentication via API key.
      name: X-Api-Key
      in: header
    bearerAuth:
      type: http
      description: |-
        Authentication via opaque server-issued session token.
        Tokens are obtained from `POST /api/v1/user/login` or
        `POST /api/v1/user/oidc/login`.
      scheme: bearer
      bearerFormat: Opaque
