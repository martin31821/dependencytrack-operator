servers:
- url: /api/v2
security:
- apiKeyAuth: []
- bearerAuth: []
tags:
- name: Components
  description: Endpoints related to components
- name: Extensions
  description: Endpoints related to extensions
- name: Projects
  description: Endpoints related to projects
- name: Secrets
  description: Endpoints related to secrets
- name: System Capabilities
  description: Endpoints exposing the capabilities of the running server
- name: Task Queues
  description: Endpoints related to task queue management
- name: Vuln Data Sources
  description: Endpoints related to vulnerability data sources
- name: Vuln Policies
  description: Endpoints related to vulnerability policies
- name: Workflows
  description: Endpoints related to workflows
paths:
  /components:
    get:
      tags:
      - Components
      summary: List all components
      description: |-
        Retrieves a list of all components matching the provided filter criteria.

        Text filters are case-insensitive.

        ### Sortable fields

        Sorting is supported for the following fields:

        * `name`
        * `group`
        * `last_inherited_risk_score`

        ### Expandable fields

        The following fields can be included via `expand`:

        * `metrics`
        * `package_metadata`
        * `package_artifact_metadata`

        Requires permission `VIEW_PORTFOLIO`
      operationId: listComponents
      parameters:
      - name: group_contains
        in: query
        description: Filter by group (substring match)
        schema:
          type: string
      - name: name_contains
        in: query
        description: Filter by name (substring match)
        schema:
          type: string
      - name: version_contains
        in: query
        description: Filter by version (substring match)
        schema:
          type: string
      - name: purl_prefix
        in: query
        description: |-
          Filter by PURL (prefix match).

          Must be a valid PURL, with at least `pkg:<ecosystem>/<name>` populated.
        schema:
          type: string
      - name: cpe
        in: query
        description: |-
          Filter by CPE (exact match).

          Must be a valid CPE.
        schema:
          type: string
      - name: swid_tag_id_contains
        in: query
        description: Filter by SWID Tag ID (substring match)
        schema:
          type: string
      - name: hash_type
        in: query
        description: The hash type to filter by
        schema:
          type: string
          enum:
          - MD5
          - SHA1
          - SHA_256
          - SHA_384
          - SHA_512
          - SHA3_256
          - SHA3_384
          - SHA3_512
          - BLAKE2B_256
          - BLAKE2B_384
          - BLAKE2B_512
          - BLAKE3
      - name: hash
        in: query
        description: |-
          Filter by hash value (exact match).

          Requires `hash_type` to be set.
        schema:
          type: string
      - name: package_artifact_published_since
        in: query
        description: |-
          Filter by package artifact publish date (inclusive lower bound).

          Note that components without resolved package artifact metadata,
          or whose upstream repository did not report a publication date,
          are excluded whenever `package_artifact_published_since` or
          `package_artifact_published_before` is set.
        schema:
          $ref: "#/components/schemas/timestamp"
      - name: package_artifact_published_before
        in: query
        description: Filter by package artifact publish date (exclusive upper bound).
        schema:
          $ref: "#/components/schemas/timestamp"
      - name: project_state
        in: query
        description: |-
          Filter by the state of the project that the component belongs to.

          Omit to include components from projects in any state.
        schema:
          $ref: "#/components/schemas/project-state"
      - name: project_latest_version
        in: query
        description: |-
          Filter by whether the project the component belongs to is flagged as the latest version.

          When `true`, only components from latest-version projects are returned.
          When `false`, only components from non-latest projects are returned.
          Omit to include components regardless of the flag.
        schema:
          type: boolean
      - name: expand
        in: query
        description: Optional fields to include in each component response item. Unknown
          values are silently ignored.
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: limit
        in: query
        description: Maximum number of items to retrieve from the collection
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 100
      - name: page_token
        in: query
        description: Opaque token pointing to a specific position in a collection
        schema:
          type: string
      - name: sort_direction
        in: query
        schema:
          $ref: "#/components/schemas/sort-direction"
      - name: sort_by
        in: query
        description: Field to sort by. Refer to the operation description for information
          about which fields are sortable.
        schema:
          maxLength: 255
          minLength: 1
          type: string
      responses:
        "200":
          description: A list of components matching the provided filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/list-components-response"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                anyOf:
                - $ref: "#/components/schemas/invalid-sort-field-problem-details"
                - $ref: "#/components/schemas/problem-details"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        default:
          $ref: "#/components/responses/generic-error"
    post:
      tags:
      - Components
      summary: Creates a new component for the project
      description: Requires permission `PORTFOLIO_MANAGEMENT` or `PORTFOLIO_MANAGEMENT_UPDATE`
      operationId: createComponent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/create-component-request"
        required: true
      responses:
        "201":
          description: Component Created
          headers:
            Location:
              description: URL of the created component
              schema:
                type: string
                format: uri
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                anyOf:
                - $ref: "#/components/schemas/invalid-request-problem-details"
                - $ref: "#/components/schemas/problem-details"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        "409":
          $ref: "#/components/responses/generic-conflict-error"
        default:
          $ref: "#/components/responses/generic-error"
  /extension-points:
    get:
      tags:
      - Extensions
      summary: List all extension points
      description: |-
        Returns a list of extension points, sorted by name in ascending order.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: listExtensionPoints
      responses:
        "200":
          description: List of extension points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/list-extension-points-response"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        default:
          $ref: "#/components/responses/generic-error"
  /extension-points/{extension_point_name}/extensions:
    get:
      tags:
      - Extensions
      summary: List all extensions
      description: |-
        Returns a list of extensions for a given extension point, sorted by name in ascending order.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: listExtensions
      parameters:
      - name: extension_point_name
        in: path
        description: Name of the extension point
        required: true
        schema:
          type: string
      responses:
        "200":
          description: List of extensions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/list-extensions-response"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        "404":
          $ref: "#/components/responses/generic-not-found-error"
        default:
          $ref: "#/components/responses/generic-error"
  /extension-points/{extension_point_name}/extensions/{extension_name}/config:
    get:
      tags:
      - Extensions
      summary: Get extension configuration
      description: |-
        Returns the configuration of an extension.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: getExtensionConfig
      parameters:
      - name: extension_point_name
        in: path
        description: Name of the extension point
        required: true
        schema:
          type: string
      - name: extension_name
        in: path
        description: Name of the extension
        required: true
        schema:
          type: string
      responses:
        "200":
          description: List of extensions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/get-extension-config-response"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        "404":
          $ref: "#/components/responses/generic-not-found-error"
        default:
          $ref: "#/components/responses/generic-error"
    put:
      tags:
      - Extensions
      summary: Update extension configuration
      description: |-
        Updates the configuration of an extension.

        **Do not use clear text credentials in the supplied config**.
        Fields annotated with `x-secret-ref` in the config schema expect
        a name of a managed secret, which is resolved internally by the API.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_UPDATE` permission.
      operationId: updateExtensionConfig
      parameters:
      - name: extension_point_name
        in: path
        description: Name of the extension point
        required: true
        schema:
          type: string
      - name: extension_name
        in: path
        description: Name of the extension
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/update-extension-config-request"
        required: true
      responses:
        "204":
          description: Configuration updated
        "304":
          description: Not Modified
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                anyOf:
                - $ref: "#/components/schemas/json-schema-validation-problem-details"
                - $ref: "#/components/schemas/problem-details"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        "404":
          $ref: "#/components/responses/generic-not-found-error"
        default:
          $ref: "#/components/responses/generic-error"
  /extension-points/{extension_point_name}/extensions/{extension_name}/config-schema:
    get:
      tags:
      - Extensions
      summary: Get extension configuration schema
      description: |-
        Returns the JSON schema for an extension's configuration.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: getExtensionConfigSchema
      parameters:
      - name: extension_point_name
        in: path
        description: Name of the extension point
        required: true
        schema:
          type: string
      - name: extension_name
        in: path
        description: Name of the extension
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Extension config schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/extension-config-schema"
        "204":
          description: Extension has no config schema
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        "404":
          $ref: "#/components/responses/generic-not-found-error"
        default:
          $ref: "#/components/responses/generic-error"
  /extension-points/{extension_point_name}/extensions/{extension_name}/test:
    post:
      tags:
      - Extensions
      summary: Test extension
      description: |-
        Tests an extension.

        If the extension is configurable (i.e. `/config-schema` returns status `200`),
        a valid configuration **must** be provided in the test request.
        The configuration is validated against the applicable JSON schema.

        **Do not use clear text credentials in the supplied config**.
        Fields annotated with `x-secret-ref` in the config schema expect
        a name of a managed secret, which is resolved internally by the API.

        Test results contain one or more checks, each of which can have a status of
        `PASSED`, `FAILED`, or `SKIPPED`. If *at least one* check is `FAILED`,
        the entire test should be considered `FAILED`.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_UPDATE` permission.
      operationId: testExtension
      parameters:
      - name: extension_point_name
        in: path
        description: Name of the extension point
        required: true
        schema:
          type: string
      - name: extension_name
        in: path
        description: Name of the extension
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/test-extension-request"
        required: true
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/test-extension-response"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                anyOf:
                - $ref: "#/components/schemas/json-schema-validation-problem-details"
                - $ref: "#/components/schemas/problem-details"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        "404":
          $ref: "#/components/responses/generic-not-found-error"
        default:
          $ref: "#/components/responses/generic-error"
  /projects/{uuid}/clone:
    post:
      tags:
      - Projects
      summary: Clones a given project.
      description: Requires permission `PORTFOLIO_MANAGEMENT` or `PORTFOLIO_MANAGEMENT_CREATE`
      operationId: cloneProject
      parameters:
      - name: uuid
        in: path
        description: The UUID of the project to clone
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clone-project-request"
      responses:
        "201":
          description: Project cloned
          headers:
            Location:
              description: URL of the cloned project
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clone-project-response"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        "404":
          $ref: "#/components/responses/generic-not-found-error"
        "409":
          $ref: "#/components/responses/generic-conflict-error"
        default:
          $ref: "#/components/responses/generic-error"
  /projects/{uuid}/components:
    get:
      tags:
      - Projects
      summary: Retrieves a list of all components for a given project.
      description: |-
        Requires permission `VIEW_PORTFOLIO`

        ### Sortable fields

        Sorting is supported for the following fields:

        * `name`
        * `group`
        * `last_inherited_risk_score`
        * `package_artifact_metadata.published_at`

        Components without resolved artifact metadata, or whose upstream registry did not
        report a publication date, are placed at the end of the result for both sort
        directions when sorting by `package_artifact_metadata.published_at`.

        ### Expandable fields

        The following fields can be included via `expand`:

        * `metrics`
        * `package_metadata`
        * `package_artifact_metadata`
        * `occurrence_count`
      operationId: listProjectComponents
      parameters:
      - name: uuid
        in: path
        description: The UUID of the project to retrieve components for
        required: true
        schema:
          type: string
          format: uuid
      - name: only_outdated
        in: query
        description: Optionally exclude recent components so only outdated components
          are returned
        schema:
          type: boolean
      - name: only_direct
        in: query
        description: Optionally exclude transitive dependencies so only direct dependencies
          are returned
        schema:
          type: boolean
      - name: q
        in: query
        description: Optional free-text search term. Matches components whose `group`
          or `name` contains the given value (case-insensitive).
        schema:
          type: string
      - name: expand
        in: query
        description: Optional fields to include in each component response item. Unknown
          values are silently ignored.
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: limit
        in: query
        description: Maximum number of items to retrieve from the collection
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 100
      - name: page_token
        in: query
        description: Opaque token pointing to a specific position in a collection
        schema:
          type: string
      - name: sort_direction
        in: query
        schema:
          $ref: "#/components/schemas/sort-direction"
      - name: sort_by
        in: query
        description: Field to sort by. Refer to the operation description for information
          about which fields are sortable.
        schema:
          maxLength: 255
          minLength: 1
          type: string
      responses:
        "200":
          description: A list of all components for a given project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/list-project-components-response"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                anyOf:
                - $ref: "#/components/schemas/invalid-sort-field-problem-details"
                - $ref: "#/components/schemas/problem-details"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        "404":
          $ref: "#/components/responses/generic-not-found-error"
        default:
          $ref: "#/components/responses/generic-error"
  /secrets:
    get:
      tags:
      - Secrets
      summary: List secret metadata
      description: |-
        Returns a paginated list of secret metadata.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: listSecretMetadata
      parameters:
      - name: q
        in: query
        description: Optional search text to filter secrets by. Filtering uses case-insensitive
          "starts with" semantics on the secret name.
        schema:
          type: string
      - name: page_token
        in: query
        description: Opaque token pointing to a specific position in a collection
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of items to retrieve from the collection
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 100
      responses:
        "200":
          description: Paginated list of secret metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/list-secrets-response"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        default:
          $ref: "#/components/responses/generic-error"
    post:
      tags:
      - Secrets
      summary: Create a secret
      description: |-
        Creates a new secret.

        Requires the `SECRET_MANAGEMENT` or `SECRET_MANAGEMENT_CREATE` permission.

        Administrators can configure the secret manager to be read-only.
        In that case, create requests will be rejected with status code `400`.
      operationId: createSecret
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/create-secret-request"
        required: true
      responses:
        "201":
          description: Secret created
          headers:
            Location:
              description: URL of the created secret
              schema:
                type: string
                format: uri
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                anyOf:
                - $ref: "#/components/schemas/invalid-request-problem-details"
                - $ref: "#/components/schemas/problem-details"
        "401":
          $ref: "#/components/responses/generic-unauthorized-error"
        "403":
          $ref: "#/components/responses/generic-forbidden-error"
        "409":
          $ref: "#/components/responses/generic-conflict-error"
        default:
