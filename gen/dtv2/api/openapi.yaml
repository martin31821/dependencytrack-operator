  /internal/workflow-runs:
    get:
      description: |-
        Returns a paginated list of workflow runs.

        ### Sortable fields

        Sorting is supported for the for the following fields:

        * `id`
        * `created_at`
        * `completed_at`

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: listWorkflowRuns
      parameters:
      - description: Name of the workflow to filter by. Must be an exact match.
        explode: true
        in: query
        name: workflow_name
        required: false
        schema:
          type: string
        style: form
      - description: Version of the workflow to filter by. Must be an exact match.
        explode: true
        in: query
        name: workflow_version
        required: false
        schema:
          format: int32
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Workflow instance ID to filter by. Must be an exact match.
        explode: true
        in: query
        name: workflow_instance_id
        required: false
        schema:
          type: string
        style: form
      - description: Status to filter by
        explode: true
        in: query
        name: status
        required: false
        schema:
          $ref: "#/components/schemas/workflow-run-status"
        style: form
      - description: |-
          Filter by label in `key=value` form. Repeat to require multiple labels.
          A run matches only if it carries every supplied label.
          On duplicate keys the last occurrence wins.
        explode: true
        in: query
        name: label
        required: false
        schema:
          items:
            pattern: "^[^=]+=.*$"
            type: string
          type: array
        style: form
      - description: Filter runs created on or after this timestamp.
        explode: true
        in: query
        name: created_since
        required: false
        schema:
          $ref: "#/components/schemas/timestamp"
        style: form
      - description: Filter runs created before this timestamp.
        explode: true
        in: query
        name: created_before
        required: false
        schema:
          $ref: "#/components/schemas/timestamp"
        style: form
      - description: Filter runs completed on or after this timestamp.
        explode: true
        in: query
        name: completed_since
        required: false
        schema:
          $ref: "#/components/schemas/timestamp"
        style: form
      - description: Filter runs completed before this timestamp.
        explode: true
        in: query
        name: completed_before
        required: false
        schema:
          $ref: "#/components/schemas/timestamp"
        style: form
      - description: Maximum number of items to retrieve from the collection
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          format: int32
          maximum: 1000
          minimum: 1
          type: integer
        style: form
      - description: Opaque token pointing to a specific position in a collection
        explode: true
        in: query
        name: page_token
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: sort_direction
        required: false
        schema:
          $ref: "#/components/schemas/sort-direction"
        style: form
      - description: Field to sort by. Refer to the operation description for information
          about which fields are sortable.
        explode: true
        in: query
        name: sort_by
        required: false
        schema:
          maxLength: 255
          minLength: 1
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/list-workflow-runs-response"
          description: Paginated list of workflow runs
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/listWorkflowRuns_400_response"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 401
                title: Unauthorized
                detail: Not authorized to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 403
                title: Forbidden
                detail: Not permitted to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unexpected error
      summary: List all workflow runs
      tags:
      - Workflows
