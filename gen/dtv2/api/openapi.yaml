openapi: 3.0.3
info:
  contact:
    email: dependencytrack@owasp.org
    name: The Dependency-Track Authors
    url: https://github.com/DependencyTrack/dependency-track
  description: |-
    # REST API of OWASP Dependency-Track

    ## Pagination

    This API implements token-based pagination.
    Collection responses have the following structure:

    ```json
    {
      "items": [...],
      "next_page_token": "abcdefg",
      "total": {
        "count": 100,
        "type": "EXACT"
      }
    }
    ```

    `next_page_token` is present when more items exist, and absent otherwise.
    To fetch the next page, pass it as the `page_token` query parameter.

    To navigate backwards, clients should keep track of previous page tokens
    as they paginate through collections. The API does *not* provide
    backward navigation!

    Collections that support sorting will only consider the `sort_by`
    and `sort_direction` query parameters for the request of the first
    page. For subsequent pages, sorting preferences are bound to the
    page token.

    Page tokens are opaque strings. Clients should not try to interpret
    or generate them. Their format may change without notice.

    The `total` object discloses how many items exist in the collection
    *across all pages*. Because counting is expensive, some collections
    that hold *a lot* of items may return partial counts (type `AT_LEAST`)
    instead of exact counts (type `EXACT`). Which type to expect is usually
    documented in the operation's description.

    ## Sorting

    Items in a collection can be sorted using the `sort_by` and `sort_direction`
    query parameters. Which fields are sortable is documented in the respective
    operation's description.

    Note that if no sortable fields are documented for an operation,
    sorting is not supported *at all*.

    ## Field expansion

    Some collection endpoints support an `expand` query parameter.
    Passing an expand value includes optional fields in each response item
    that are omitted by default, typically because they are expensive to compute
    and only needed in specific contexts.

    Valid `expand` values for an endpoint are listed in its operation description.
    Unknown values are silently ignored.

    ## Errors

    All error responses use the `application/problem+json` media type
    as defined in [RFC 9457](https://www.rfc-editor.org/rfc/rfc9457.html).

    Example:

    ```json
    {
      "type": "about:blank",
      "status": 404,
      "title": "Resource Not Found",
      "detail": "No project with UUID 0976ef46-e4a0-4be4-8b0e-00e9d3625c1f exists"
    }
    ```

    ## Authentication

    Two credential types are accepted:

    - **API key** via the `X-Api-Key` request header. API keys are
      long-lived and intended for machine-to-machine integrations.
    - **Bearer token** via the `Authorization: Bearer <token>` request
      header. Bearer tokens are short-lived, user-bound, and opaque
      server-issued session tokens.

    Bearer tokens are obtained from one of the following endpoints:

    - `POST /api/v1/user/login`
    - `POST /api/v1/user/oidc/login`

    API v2 does not yet provide its own login endpoints; clients use
    the v1 endpoints above to acquire tokens and then call v2 with them.

    Tokens are valid for 8 hours by default and **cannot be refreshed**.
    Clients must re-authenticate once a token expires.

    Requests with missing or invalid credentials are rejected with
    `401 Unauthorized`.

    ## Authorization

    Access is gated by named permissions. Operations document
    the permission(s) they require; operations without a documented
    permission requirement only require authentication.

    When the *Portfolio Access Control* feature is enabled
    (disabled by default), project-scoped operations additionally enforce
    per-project access via team membership. The `PORTFOLIO_ACCESS_CONTROL_BYPASS`
    permission grants access to all projects regardless of team mappings.
    When the feature is disabled, all authenticated callers holding the required
    permission can access all projects.

    Authenticated requests that lack the required permission, or that
    target a project the caller cannot access, are rejected with
    `403 Forbidden`.

    ## HTTP Methods

    | Method   | Semantics                  |
    |----------|----------------------------|
    | `GET`    | Retrieve a resource        |
    | `POST`   | Create a new resource      |
    | `PUT`    | Update a resource          |
    | `PATCH`  | Partially update a resource|
    | `DELETE` | Delete a resource          |

    ## Response Conventions

    Create and update operations (`POST`, `PUT`, `PATCH`) do not return
    the full resource in the response. They return either no body,
    or only server-generated identifiers (e.g. a UUID).
    `POST` responses may include a `Location` header linking to the
    created resource.

    Delete operations return `204 No Content` with no body.

    ## Deprecations

    Operations may be removed or replaced over time. When a response
    carries the `X-API-Deprecated: true` header, the operation that
    produced it is deprecated and may be removed in a future release.
    Clients should check for this header on every response and surface
    it (e.g. via a log warning) so that operators are aware of upcoming
    breakages. The respective operation's description points out which
    alternative operation(s) to use.

    ## Internal operations

    Operations under the `/internal` path prefix expose system internals
    and are reserved for first-party use. They are **not** part of the
    stable v2 API contract and may change or be removed without notice.
    Third-party clients should not depend on them.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: OWASP Dependency-Track
  version: 2.0.0
servers:
- url: /api/v2
security:
- apiKeyAuth: []
- bearerAuth: []
tags:
- description: Endpoints related to components
  name: Components
- description: Endpoints related to extensions
  name: Extensions
- description: Endpoints related to projects
  name: Projects
- description: Endpoints related to secrets
  name: Secrets
- description: Endpoints exposing the capabilities of the running server
  name: System Capabilities
- description: Endpoints related to task queue management
  name: Task Queues
- description: Endpoints related to vulnerability data sources
  name: Vuln Data Sources
- description: Endpoints related to vulnerability policies
  name: Vuln Policies
- description: Endpoints related to workflows
  name: Workflows
paths:
  /components:
    get:
      description: |-
        Retrieves a list of all components matching the provided filter criteria.

        Text filters are case-insensitive.

        ### Sortable fields

        Sorting is supported for the following fields:

        * `name`
        * `group`
        * `last_inherited_risk_score`

        ### Expandable fields

        The following fields can be included via `expand`:

        * `metrics`
        * `package_metadata`
        * `package_artifact_metadata`

        Requires permission `VIEW_PORTFOLIO`
      operationId: listComponents
      parameters:
      - description: Filter by group (substring match)
        explode: true
        in: query
        name: group_contains
        required: false
        schema:
          type: string
        style: form
      - description: Filter by name (substring match)
        explode: true
        in: query
        name: name_contains
        required: false
        schema:
          type: string
        style: form
      - description: Filter by version (substring match)
        explode: true
        in: query
        name: version_contains
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Filter by PURL (prefix match).

          Must be a valid PURL, with at least `pkg:<ecosystem>/<name>` populated.
        explode: true
        in: query
        name: purl_prefix
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Filter by CPE (exact match).

          Must be a valid CPE.
        explode: true
        in: query
        name: cpe
        required: false
        schema:
          type: string
        style: form
      - description: Filter by SWID Tag ID (substring match)
        explode: true
        in: query
        name: swid_tag_id_contains
        required: false
        schema:
          type: string
        style: form
      - description: The hash type to filter by
        explode: true
        in: query
        name: hash_type
        required: false
        schema:
          enum:
          - MD5
          - SHA1
          - SHA_256
          - SHA_384
          - SHA_512
          - SHA3_256
          - SHA3_384
          - SHA3_512
          - BLAKE2B_256
          - BLAKE2B_384
          - BLAKE2B_512
          - BLAKE3
          type: string
        style: form
      - description: |-
          Filter by hash value (exact match).

          Requires `hash_type` to be set.
        explode: true
        in: query
        name: hash
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Filter by package artifact publish date (inclusive lower bound).

          Note that components without resolved package artifact metadata,
          or whose upstream repository did not report a publication date,
          are excluded whenever `package_artifact_published_since` or
          `package_artifact_published_before` is set.
        explode: true
        in: query
        name: package_artifact_published_since
        required: false
        schema:
          $ref: "#/components/schemas/timestamp"
        style: form
      - description: Filter by package artifact publish date (exclusive upper bound).
        explode: true
        in: query
        name: package_artifact_published_before
        required: false
        schema:
          $ref: "#/components/schemas/timestamp"
        style: form
      - description: |-
          Filter by the state of the project that the component belongs to.

          Omit to include components from projects in any state.
        explode: true
        in: query
        name: project_state
        required: false
        schema:
          $ref: "#/components/schemas/project-state"
        style: form
      - description: |-
          Filter by whether the project the component belongs to is flagged as the latest version.

          When `true`, only components from latest-version projects are returned.
          When `false`, only components from non-latest projects are returned.
          Omit to include components regardless of the flag.
        explode: true
        in: query
        name: project_latest_version
        required: false
        schema:
          type: boolean
        style: form
      - description: Optional fields to include in each component response item. Unknown
          values are silently ignored.
        explode: true
        in: query
        name: expand
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Maximum number of items to retrieve from the collection
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          format: int32
          maximum: 1000
          minimum: 1
          type: integer
        style: form
      - description: Opaque token pointing to a specific position in a collection
        explode: true
        in: query
        name: page_token
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: sort_direction
        required: false
        schema:
          $ref: "#/components/schemas/sort-direction"
        style: form
      - description: Field to sort by. Refer to the operation description for information
          about which fields are sortable.
        explode: true
        in: query
        name: sort_by
        required: false
        schema:
          maxLength: 255
          minLength: 1
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/list-components-response"
          description: A list of components matching the provided filters
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/listComponents_400_response"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 401
                title: Unauthorized
                detail: Not authorized to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 403
                title: Forbidden
                detail: Not permitted to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unexpected error
      summary: List all components
      tags:
      - Components
    post:
      description: Requires permission `PORTFOLIO_MANAGEMENT` or `PORTFOLIO_MANAGEMENT_UPDATE`
      operationId: createComponent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/create-component-request"
        required: true
      responses:
        "201":
          description: Component Created
          headers:
            Location:
              description: URL of the created component
              explode: false
              schema:
                format: uri
                type: string
              style: simple
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/createComponent_400_response"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 401
                title: Unauthorized
                detail: Not authorized to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 403
                title: Forbidden
                detail: Not permitted to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        "409":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 409
                title: Conflict
                detail: The resource already exists.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unexpected error
      summary: Creates a new component for the project
      tags:
      - Components
  /extension-points:
    get:
      description: |-
        Returns a list of extension points, sorted by name in ascending order.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: listExtensionPoints
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/list-extension-points-response"
          description: List of extension points
        "401":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 401
                title: Unauthorized
                detail: Not authorized to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 403
                title: Forbidden
                detail: Not permitted to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unexpected error
      summary: List all extension points
      tags:
      - Extensions
  /extension-points/{extension_point_name}/extensions:
    get:
      description: |-
        Returns a list of extensions for a given extension point, sorted by name in ascending order.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: listExtensions
      parameters:
      - description: Name of the extension point
        explode: false
        in: path
        name: extension_point_name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/list-extensions-response"
          description: List of extensions
        "401":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 401
                title: Unauthorized
                detail: Not authorized to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 403
                title: Forbidden
                detail: Not permitted to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 404
                title: Not Found
                detail: The requested resource could not be found.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Not found
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unexpected error
      summary: List all extensions
      tags:
      - Extensions
  /extension-points/{extension_point_name}/extensions/{extension_name}/config:
    get:
      description: |-
        Returns the configuration of an extension.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: getExtensionConfig
      parameters:
      - description: Name of the extension point
        explode: false
        in: path
        name: extension_point_name
        required: true
        schema:
          type: string
        style: simple
      - description: Name of the extension
        explode: false
        in: path
        name: extension_name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/get-extension-config-response"
          description: List of extensions
        "401":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 401
                title: Unauthorized
                detail: Not authorized to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 403
                title: Forbidden
                detail: Not permitted to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 404
                title: Not Found
                detail: The requested resource could not be found.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Not found
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unexpected error
      summary: Get extension configuration
      tags:
      - Extensions
    put:
      description: |-
        Updates the configuration of an extension.

        **Do not use clear text credentials in the supplied config**.
        Fields annotated with `x-secret-ref` in the config schema expect
        a name of a managed secret, which is resolved internally by the API.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_UPDATE` permission.
      operationId: updateExtensionConfig
      parameters:
      - description: Name of the extension point
        explode: false
        in: path
        name: extension_point_name
        required: true
        schema:
          type: string
        style: simple
      - description: Name of the extension
        explode: false
        in: path
        name: extension_name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/update-extension-config-request"
        required: true
      responses:
        "204":
          description: Configuration updated
        "304":
          description: Not Modified
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/updateExtensionConfig_400_response"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 401
                title: Unauthorized
                detail: Not authorized to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 403
                title: Forbidden
                detail: Not permitted to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 404
                title: Not Found
                detail: The requested resource could not be found.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Not found
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unexpected error
      summary: Update extension configuration
      tags:
      - Extensions
  /extension-points/{extension_point_name}/extensions/{extension_name}/config-schema:
    get:
      description: |-
        Returns the JSON schema for an extension's configuration.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_READ` permission.
      operationId: getExtensionConfigSchema
      parameters:
      - description: Name of the extension point
        explode: false
        in: path
        name: extension_point_name
        required: true
        schema:
          type: string
        style: simple
      - description: Name of the extension
        explode: false
        in: path
        name: extension_name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/extension-config-schema"
          description: Extension config schema
        "204":
          description: Extension has no config schema
        "401":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 401
                title: Unauthorized
                detail: Not authorized to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 403
                title: Forbidden
                detail: Not permitted to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 404
                title: Not Found
                detail: The requested resource could not be found.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Not found
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unexpected error
      summary: Get extension configuration schema
      tags:
      - Extensions
  /extension-points/{extension_point_name}/extensions/{extension_name}/test:
    post:
      description: |-
        Tests an extension.

        If the extension is configurable (i.e. `/config-schema` returns status `200`),
        a valid configuration **must** be provided in the test request.
        The configuration is validated against the applicable JSON schema.

        **Do not use clear text credentials in the supplied config**.
        Fields annotated with `x-secret-ref` in the config schema expect
        a name of a managed secret, which is resolved internally by the API.

        Test results contain one or more checks, each of which can have a status of
        `PASSED`, `FAILED`, or `SKIPPED`. If *at least one* check is `FAILED`,
        the entire test should be considered `FAILED`.

        Requires the `SYSTEM_CONFIGURATION` or `SYSTEM_CONFIGURATION_UPDATE` permission.
      operationId: testExtension
      parameters:
      - description: Name of the extension point
        explode: false
        in: path
        name: extension_point_name
        required: true
        schema:
          type: string
        style: simple
      - description: Name of the extension
        explode: false
        in: path
        name: extension_name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/test-extension-request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/test-extension-response"
          description: Test result
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/updateExtensionConfig_400_response"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 401
                title: Unauthorized
                detail: Not authorized to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 403
                title: Forbidden
                detail: Not permitted to access the requested resource.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              example:
                type: about:blank
                status: 404
                title: Not Found
                detail: The requested resource could not be found.
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Not found
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem-details"
          description: Unexpected error
      summary: Test extension
      tags:
      - Extensions
  /projects/{uuid}/clone:
    post:
      description: Requires permission `PORTFOLIO_MANAGEMENT` or `PORTFOLIO_MANAGEMENT_CREATE`
      operationId: cloneProject
      parameters:
      - description: The UUID of the project to clone
        explode: false
        in: path
        name: uuid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/clone-project-request"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/clone-project-response"
          description: Project cloned
          headers:
            Location:
              description: URL of the cloned project
              explode: false
              schema:
                format: uri
                type: string
