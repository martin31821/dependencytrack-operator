        schema:
          default: "1"
          type: string
        style: form
      - description: Number of elements to return per page. To be used in conjunction
          with <code>pageNumber</code>.
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          default: "100"
          type: string
        style: form
      - description: Offset to start returning elements from. To be used in conjunction
          with <code>limit</code>.
        explode: true
        in: query
        name: offset
        required: false
        schema:
          type: string
        style: form
      - description: Number of elements to return per page. To be used in conjunction
          with <code>offset</code>.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          type: string
        style: form
      - description: Name of the resource field to sort on.
        explode: true
        in: query
        name: sortName
        required: false
        schema:
          type: string
        style: form
      - description: Ordering of items when sorting with <code>sortName</code>.
        explode: true
        in: query
        name: sortOrder
        required: false
        schema:
          enum:
          - "asc, desc"
          type: string
        style: form
      - description: The group of the component
        explode: true
        in: query
        name: group
        required: false
        schema:
          type: string
        style: form
      - description: The name of the component
        explode: true
        in: query
        name: name
        required: false
        schema:
          type: string
        style: form
      - description: The version of the component
        explode: true
        in: query
        name: version
        required: false
        schema:
          type: string
        style: form
      - description: The purl of the component
        explode: true
        in: query
        name: purl
        required: false
        schema:
          type: string
        style: form
      - description: The cpe of the component
        explode: true
        in: query
        name: cpe
        required: false
        schema:
          type: string
        style: form
      - description: The swidTagId of the component
        explode: true
        in: query
        name: swidTagId
