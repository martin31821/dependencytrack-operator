apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dependencytrack-operator.fullname" . }}-manager-role
  labels:
  {{- include "dependencytrack-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - apikeys
  - teams
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - apikeys/finalizers
  - teams/finalizers
  verbs:
  - update
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - apikeys/status
  - teams/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dependencytrack-operator.fullname" . }}-manager-rolebinding
  labels:
  {{- include "dependencytrack-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "dependencytrack-operator.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "dependencytrack-operator.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
