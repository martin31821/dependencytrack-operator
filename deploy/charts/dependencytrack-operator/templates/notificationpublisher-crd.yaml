apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: notificationpublishers.dependencytrack.mko.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  labels:
  {{- include "dependencytrack-operator.labels" . | nindent 4 }}
spec:
  group: dependencytrack.mko.dev
  names:
    kind: NotificationPublisher
    listKind: NotificationPublisherList
    plural: notificationpublishers
    singular: notificationpublisher
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.uuid
      name: UUID
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NotificationPublisher is the Schema for the notificationpublishers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NotificationPublisherSpec defines the desired state of NotificationPublisher.
            properties:
              description:
                description: Description is an optional human-readable description
                  of the publisher.
                maxLength: 1024
                type: string
              extensionName:
                description: |-
                  ExtensionName identifies the Dependency-Track publisher extension.
                  Valid values include: email, slack, webhook, opsgenie, and others
                  supported by the installed DT plugins.
                minLength: 1
                type: string
              name:
                description: Name is the display name for this publisher in Dependency-Track.
                maxLength: 255
                minLength: 1
                type: string
            required:
            - extensionName
            - name
            type: object
          status:
            description: NotificationPublisherStatus defines the observed state of
              NotificationPublisher.
            properties:
              conditions:
                description: Conditions reflect the current reconciliation state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              name:
                description: Name records the name that was last synced to DependencyTrack.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration reflects the most recent metadata.Generation
                  observed by the reconciler.
                format: int64
                type: integer
              uuid:
                description: UUID is the actual UUID of the publisher in DependencyTrack.
                type: string
