apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dependencytrack-operator.fullname" . }}-notificationpublisher-admin-role
  labels:
  {{- include "dependencytrack-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - notificationpublishers
  verbs:
  - '*'
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - notificationpublishers/status
  verbs:
  - get
