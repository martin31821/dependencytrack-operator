apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: policies.dependencytrack.mko.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  labels:
  {{- include "dependencytrack-operator.labels" . | nindent 4 }}
spec:
  group: dependencytrack.mko.dev
  names:
    kind: Policy
    listKind: PolicyList
    plural: policies
    singular: policy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.uuid
      name: UUID
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Policy is the Schema for the policies API.
          Policy resources are namespaced and manage DependencyTrack policies.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PolicySpec defines the desired state of Policy.
            properties:
              conditions:
                description: |-
                  Conditions is the list of inline conditions that must be evaluated.
                  At least one condition must be provided.
                items:
                  description: PolicyCondition defines a single condition within a Policy.
                  properties:
                    operator:
                      description: Operator specifies whether the subject is or is not
                        the configured value.
                      enum:
                      - IS
                      - IS_NOT
                      - MATCHES
                      - NO_MATCH
                      - NUMERIC_GREATER_THAN
                      - NUMERIC_LESS_THAN
                      - NUMERIC_EQUAL
                      - NUMERIC_NOT_EQUAL
                      - NUMERIC_GREATER_THAN_OR_EQUAL
                      - NUMERIC_LESSER_THAN_OR_EQUAL
                      - CONTAINS_ALL
                      - CONTAINS_ANY
                      type: string
                    subject:
                      description: Subject specifies the Dependency-Track property to
                        evaluate.
                      enum:
                      - AGE
                      - COORDINATES
                      - CPE
                      - EXPRESSION
                      - LICENSE
                      - LICENSE_GROUP
                      - PACKAGE_URL
                      - SEVERITY
                      - SWID_TAGID
                      - VERSION
                      - COMPONENT_HASH
                      - CWE
                      - VULNERABILITY_ID
                      - VERSION_DISTANCE
                      - EPSS
                      type: string
                    value:
                      description: Value is the value compared against the subject.
                      type: string
                  required:
                  - operator
                  - subject
                  - value
                  type: object
                minItems: 1
                type: array
              name:
                description: Name is the human-readable name of the policy.
                maxLength: 255
                minLength: 1
                type: string
              operator:
                description: Operator defines whether any or all policy conditions must
                  match.
                enum:
                - ANY
                - ALL
                type: string
              violationState:
                description: ViolationState defines the severity assigned when policy
                  conditions are violated.
                enum:
                - INFO
                - WARN
                - FAIL
                type: string
            required:
            - conditions
            - name
            - operator
            - violationState
            type: object
          status:
            description: PolicyStatus defines the observed state of Policy.
            properties:
              conditions:
                description: Conditions reflect the current reconciliation state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              name:
                description: Name records the name that was last synced to DependencyTrack.
                type: string
              uuid:
                description: UUID is the actual UUID of the policy in DependencyTrack.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []
