apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dependencytrack-operator.fullname" . }}-policy-editor-role
  labels:
  {{- include "dependencytrack-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - policies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - policies/status
  verbs:
  - get
  - patch
  - update
