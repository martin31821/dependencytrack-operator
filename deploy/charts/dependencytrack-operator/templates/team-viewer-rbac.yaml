apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dependencytrack-operator.fullname" . }}-team-viewer-role
  labels:
  {{- include "dependencytrack-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - teams
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - teams/status
  verbs:
  - get
