name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.1.6)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Lint
        run: nix develop --command make lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Run tests
        run: nix develop --command make test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Run E2E tests
        run: nix develop --command make test-e2e

  build-push:
    name: Build and push image
    needs: [lint, test, test-e2e]
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-sync:
    name: Sync Helm chart from kustomize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Generate Helm chart from kustomize
        run: nix develop --command make helm-chart IMG=controller:latest

      - name: Check chart is in sync
        run: |
          if ! git diff --quiet deploy/charts/dependencytrack-operator/; then
            echo "::error::Helm chart is out of sync with kustomize manifests."
            echo "Run 'make helm-chart' locally and commit the generated chart."
            git diff deploy/charts/dependencytrack-operator/
            exit 1
          fi

  helm-release:
    name: Release chart (OCI)
    if: github.event_name == 'workflow_dispatch'
    needs: [build-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release version
        id: version
        run: |
          CHART=deploy/charts/dependencytrack-operator/Chart.yaml
          VERSION=$(awk '/^version:/{print $2}' "$CHART" | tr -d '"')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Use the manually provided version
            RELEASE_VERSION="${{ github.event.inputs.release_version }}"
            echo "Using dispatch version: ${RELEASE_VERSION}"
          else
            # Auto-increment patch version
            RELEASE_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Auto-incremented version: ${RELEASE_VERSION}"
          fi
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and package chart
        run: |
          IMAGE="${{ needs.build-push.outputs.image-ref }}"
          REPO=$(echo "$IMAGE" | sed 's/:.*$//')
          TAG=$(echo "$IMAGE" | sed 's/.*://')
          VERSION="${{ steps.version.outputs.version }}"
          echo "Chart image: ${REPO}:${TAG}"
          echo "Release version: ${VERSION}"

          # Update values.yaml for this release (in-memory only)
          sed -i "s|^\\s*repository:.*|      repository: ${REPO}|" deploy/charts/dependencytrack-operator/values.yaml
          sed -i "s|^\\s*tag:.*|      tag: ${TAG}|" deploy/charts/dependencytrack-operator/values.yaml

          APP_VERSION=$(awk '/^appVersion:/{gsub(/"/,"",$2); print $2}' "$CHART")

          # Package chart with release version
          helm package deploy/charts/dependencytrack-operator/ \
            --version "$VERSION" \
            --app-version "$APP_VERSION" \
            --destination .

          echo "Package: dependencytrack-operator-${VERSION}.tgz"

      - name: Push chart to GHCR (OCI)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          helm push "dependencytrack-operator-${VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Create Git tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          echo "Creating tag ${TAG} and release..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"
          gh release create "$TAG" --generate-notes --verify-tag