name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.0

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind
        run: kind version

      - name: Running E2E Tests
        run: |
          go mod tidy
          make test-e2e

  build-push:
    name: Build and push image
    needs: [lint, test, test-e2e]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-release:
    name: Release charts
    needs: [build-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Update image in chart values
        run: |
          IMAGE="${{ needs.build-push.outputs.image-ref }}"
          REPO=$(echo "$IMAGE" | sed 's/:.*$//')
          TAG=$(echo "$IMAGE" | sed 's/.*://')
          echo "Chart image: ${REPO}:${TAG}"
          sed -i "s|^\\s*repository:.*|      repository: ${REPO}|" deploy/charts/dependencytrack-operator/values.yaml
          sed -i "s|^\\s*tag:.*|      tag: ${TAG}|" deploy/charts/dependencytrack-operator/values.yaml

      - name: Bump chart version
        run: |
          CHART=deploy/charts/dependencytrack-operator/Chart.yaml
          VERSION=$(awk '/^version:/{print $2}' $CHART | tr -d '"')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" $CHART
          echo "Bumped chart: ${VERSION} → ${NEW_VERSION}"

      - name: Commit and push
        run: |
          git add deploy/charts/dependencytrack-operator/
          git commit -m "chore(release): bump chart version" || echo "No changes to commit"
          git push

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: deploy/charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"