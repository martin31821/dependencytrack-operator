---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: notificationrules.dependencytrack.mko.dev
spec:
  group: dependencytrack.mko.dev
  names:
    kind: NotificationRule
    listKind: NotificationRuleList
    plural: notificationrules
    singular: notificationrule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.uuid
      name: UUID
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NotificationRule is the Schema for the notificationrules API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NotificationRuleSpec defines the desired state of NotificationRule.
            properties:
              enabled:
                default: true
                description: Enabled indicates whether the rule is active.
                type: boolean
              filterExpression:
                description: FilterExpression is an optional QL filter string for
                  the rule.
                maxLength: 1024
                type: string
              level:
                description: Level filters notifications by severity.
                enum:
                - INFORMATIONAL
                - WARNING
                - ERROR
                type: string
              logSuccessfulPublish:
                description: |-
                  LogSuccessfulPublish, when true, enables logging for successful
                  notification publishes. When false or omitted, only failures are logged.
                type: boolean
              message:
                description: |-
                  Message is an optional custom notification message template.
                  Allowed characters: whitespace, Unicode letters, numbers, and punctuation.
                maxLength: 4096
                type: string
              name:
                description: Name is the display name for this rule in Dependency-Track.
                maxLength: 255
                minLength: 1
                type: string
              notifyChildren:
                description: |-
                  NotifyChildren controls whether the rule also applies to child projects.
                  Only meaningful when scope is PORTFOLIO or SYSTEM.
                type: boolean
              notifyOn:
                description: NotifyOn lists event types that trigger the rule (e.g.
                  NEW_VULNERABILITY).
                items:
                  description: |-
                    NotificationRuleTriggerEvent defines valid notification event types
                    (NotificationGroup values) accepted by Dependency-Track v5.0.2.
                  enum:
                  - NEW_VULNERABILITIES_SUMMARY
                  - NEW_POLICY_VIOLATIONS_SUMMARY
                  - BOM_VALIDATION_FAILED
                  - USER_DELETED
                  - ANALYZER
                  - BOM_CONSUMED
                  - DATASOURCE_MIRRORING
                  - BOM_PROCESSING_FAILED
                  - BOM_PROCESSED
                  - FILE_SYSTEM
                  - INTEGRATION
                  - CONFIGURATION
                  - VEX_PROCESSED
                  - PROJECT_AUDIT_CHANGE
                  - VULNERABILITY_RETRACTED
                  - VEX_CONSUMED
                  - NEW_VULNERABLE_DEPENDENCY
                  - REPOSITORY
                  - USER_CREATED
                  - POLICY_VIOLATION
                  - NEW_VULNERABILITY
                  - PROJECT_CREATED
                  type: string
                type: array
              projects:
                description: |-
                  Projects lists project UUIDs to associate with this rule when
                  scope is PORTFOLIO. For PORTFOLIO or SYSTEM scopes,
                  the controller ignores this field.
                items:
                  type: string
                type: array
              publisherConfigSecretRef:
                description: |-
                  PublisherConfigSecretRef references a Secret whose data key contains
                  the publisherConfig JSON document for this rule.
                  The Secret must reside in the same namespace as the NotificationRule.
                properties:
                  key:
                    description: Key within the Secret that holds the publisherConfig
                      JSON document.
                    minLength: 1
                    type: string
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                required:
                - key
                - name
                type: object
              publisherRef:
                description: PublisherRef references a managed NotificationPublisher
                  in the same namespace.
                properties:
                  name:
                    description: Name is the name of the NotificationPublisher resource
                      in the same namespace.
                    type: string
                required:
                - name
                type: object
              scheduleCron:
                description: |-
                  ScheduleCron is a cron expression that defines when the scheduled rule
                  fires. Only applicable when triggerType is SCHEDULE. Must not be set
                  for rules with triggerType EVENT.
                maxLength: 256
                type: string
              scheduleSkipUnchanged:
                description: |-
                  ScheduleSkipUnchanged controls whether the scheduled rule skips emitting
                  a notification if the result is unchanged since the last emission.
                  Only applicable when triggerType is SCHEDULE.
                type: boolean
              scope:
                description: Scope controls which projects the rule applies to.
                enum:
                - SYSTEM
                - PORTFOLIO
                type: string
              teams:
                description: |-
                  Teams lists NotificationRuleTeam CRD names in the same namespace
                  whose remote DependencyTrack UUID will be associated with this rule.
                  Only the first matching Team CRD is used; duplicates are deduplicated.
                items:
                  type: string
                type: array
              triggerType:
                description: TriggerType determines whether the rule fires on events
                  or on a schedule.
                enum:
                - EVENT
                - SCHEDULE
                type: string
            required:
            - level
            - name
            - publisherRef
            - scope
            - triggerType
            type: object
          status:
            description: NotificationRuleStatus defines the observed state of NotificationRule.
            properties:
              conditions:
                description: Conditions reflect the current reconciliation state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              name:
                description: Name records the name that was last synced to DependencyTrack.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration reflects the most recent metadata.Generation
                  observed by the reconciler.
                format: int64
                type: integer
              uuid:
                description: UUID is the actual UUID of the rule in DependencyTrack.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
