# This rule is not used by the project deptrack-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over notificationpublishers within a namespace.
# This role is intended for users authorized to modify and create
# NotificationPublishers within the namespace.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: deptrack-operator
    app.kubernetes.io/managed-by: kustomize
  name: notificationpublisher-admin-role
rules:
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - notificationpublishers
  verbs:
  - '*'
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - notificationpublishers/status
  verbs:
  - get