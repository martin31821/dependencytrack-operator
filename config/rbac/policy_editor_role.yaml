# This rule is not used by the project deptrack-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Provides write access to policies within a namespace.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: deptrack-operator
    app.kubernetes.io/managed-by: kustomize
  name: policy-editor-role
rules:
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - policies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dependencytrack.mko.dev
  resources:
  - policies/status
  verbs:
  - get
  - patch
  - update