apiVersion: dependencytrack.mko.dev/v1alpha1
kind: Policy
metadata:
  namespace: deptrack-operator-system
  labels:
    app.kubernetes.io/name: deptrack-operator
    app.kubernetes.io/managed-by: kustomize
  name: policy-sample
spec:
  name: Critical Vulnerability Policy
  operator: ANY
  violationState: FAIL
  conditions:
    - subject: SEVERITY
      operator: IS
      value: CRITICAL